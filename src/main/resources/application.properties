# ============================================================
# CONEXION A BASE DE DATOS
# ADAPTAR: Cambia la URL, usuario y password segun el caso.
# Para local: usa el nombre del contenedor SQL Server.
# Para EC2:   usa la IP privada de la maquina de BD.
# ============================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:sqlserver://hackaton-sqlserver:1433;databaseName=TechStore;encrypt=true;trustServerCertificate=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:TechStore_2026!}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
# none = JPA no toca las tablas (las crea el SQL manual)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.main.allow-bean-definition-overriding=true

# Swagger UI: http://localhost:8080/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

server.port=8080

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
